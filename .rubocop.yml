Metrics/BlockLength:
  Exclude:
    - '**/*spec.rb'

Layout/ArrayAlignment:
  Exclude:
    - '**/*spec.rb'

Style/Documentation:
  Enabled: false

Layout/LineLength:
  Max: 140

Metrics/MethodLength:
  Max: 25

Metrics/AbcSize:
  Max: 20

Metrics/PerceivedComplexity:
  Max: 10

Metrics/CyclomaticComplexity:
  Max: 10
